  q_common_002: "Wie lautet Ihre Mitarbeiter- oder Portal-ID?"
  q_common_003: "Wie lautet Ihre dienstliche E-Mail-Adresse?"
  q_common_004: "Was ist Ihr aktueller Standort?"
  q_common_005: "Wie wurden Sie Ihr berufliches Profil in 2-3 Zeilen beschreiben?"
  q_common_005a: "Welche Rollen streben Sie an?"
  q_common_006: "Wie viele Jahre Berufserfahrung haben Sie insgesamt?"
  q_common_007: "Was ist Ihr aktuelles Unternehmen?"
  q_common_008: "Was sind Ihre wichtigsten Kernkompetenzen?"
  q_common_008a: "In welchen Branchen oder Domanen haben Sie gearbeitet?"
  q_common_008b: "Was sind Ihre zentralen Fachgebiete?"
  q_common_009: "Welche sekundaren Kompetenzen oder unterstutzenden Technologien haben Sie?"
  q_common_010: "Mit welchen Tools, Plattformen, Datenbanken, Cloud-Services oder Betriebssystemen haben Sie gearbeitet?"
  q_common_011: "Welche Zertifizierungen haben Sie?"
  q_common_012: "Bitte teilen Sie Ihre Bildungsabschlusse mit."
  q_common_013: "Welche Sprachen sprechen oder schreiben Sie?"

  q_tl_001: "Wie viele Ingenieurinnen und Ingenieure haben Sie gefuhrt und in welchen Rollen?"
  q_tl_002: "Fur welche Systeme, Services oder Module hatten Sie End-to-End-Verantwortung?"
  q_tl_003: "Welche wichtigen Architektur- oder Designentscheidungen haben Sie vorangetrieben?"
  q_tl_004: "Wie haben Sie Sprints geplant und Lieferung mit technischem Schuldenabbau ausbalanciert?"
  q_tl_005: "Wie haben Sie Entwicklerinnen und Entwickler gecoacht und die Teamfahigkeiten verbessert?"

  q_sdss_001: "Was ist Ihr primares Spezialisierungsgebiet in der Softwareentwicklung?"
  q_sdss_002: "Konnen Sie ein Beispiel fur ein komplexes technisches Problem nennen, das Sie gelost haben?"
  q_sdss_003: "Welche Engineering-Praktiken nutzen Sie fur Codequalitat und Zuverlassigkeit?"
  q_sdss_004: "Wie arbeiten Sie mit Architektinnen und Architekten, Product Ownern und QA-Teams zusammen?"
  q_sdss_005: "Welchen messbaren technischen Beitrag haben Sie in den letzten Projekten erzielt?"

  q_sda_001: "Wie analysieren Sie fachliche Anforderungen vor der Umsetzung?"
  q_sda_002: "Welche technischen Dokumente oder Artefakte erstellen Sie in der Regel?"
  q_sda_003: "Wie koordinieren Sie sich mit Fachbereichen und Entwicklungsteams?"
  q_sda_004: "Wie gehen Sie mit Anforderungsanderungen und Fehlerklarungen um?"
  q_sda_005: "Welche Prozessverbesserungen haben Sie in Analyse oder Lieferung eingefuhrt?"

  q_sdm_001: "Wie gross sind die Teams, die Sie fuhren, und wie sind sie strukturiert?"
  q_sdm_002: "Wie steuern Sie Planung, Umsetzung und Release-Governance?"
  q_sdm_003: "Wie gehen Sie mit Recruiting, Coaching und Performance-Management um?"
  q_sdm_004: "Wie verfolgen Sie Risiken, Abhangigkeiten und teamubergreifende Blocker?"
  q_sdm_005: "Welche geschaftlichen oder kundenbezogenen Ergebnisse haben Ihre Teams geliefert?"

  q_bia_001: "Welche BI-Tools und Plattformen nutzen Sie am haufigsten?"
  q_bia_002: "Wie entwerfen Sie KPI-Dashboards fur unterschiedliche Zielgruppen im Unternehmen?"
  q_bia_003: "Wie ist Ihr Ansatz fur Datenmodellierung und den Entwurf semantischer Schichten?"
  q_bia_004: "Wie stellen Sie Datenqualitat, Konsistenz und Governance in Reports sicher?"
  q_bia_005: "Konnen Sie ein Beispiel nennen, bei dem Ihre Analysen eine wichtige Entscheidung beeinflusst haben?"
