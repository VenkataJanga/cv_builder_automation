apiVersion: apps/v1
kind: Deployment
metadata:
  name: cv-builder-api
  labels:
    app: cv-builder-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cv-builder-api
  template:
    metadata:
      labels:
        app: cv-builder-api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/cv-builder-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: ENV
              value: "prod"
            - name: SESSION_REPOSITORY_BACKEND
              value: "mysql"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: cv-builder-secrets
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: cv-builder-secrets
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: cv-builder-secrets
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: cv-builder-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cv-builder-secrets
                  key: DB_PASSWORD
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: cv-builder-secrets
                  key: SECRET_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cv-builder-secrets
                  key: OPENAI_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
