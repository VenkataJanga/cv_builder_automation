services:
  api:
    image: python:3.13-slim
    working_dir: /app
    command: sh -lc "pip install -e . ; uvicorn apps.api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    volumes:
      - ../..:/app
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_NAME:-cv_builder}
      MYSQL_USER: ${DB_USER:-cv_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
